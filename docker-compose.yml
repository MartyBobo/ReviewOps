services:
  postgres:
    image: postgres:17-alpine
    container_name: reviewops-postgres
    environment:
      POSTGRES_USER: reviewops
      POSTGRES_PASSWORD: reviewops
      POSTGRES_DB: reviewops
    ports:
      - "5432:5432"
    volumes:
      - reviewops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviewops -d reviewops"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  reviewops_postgres_data:
